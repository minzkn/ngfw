# NGFW Firewall Rules
# Default firewall configuration

[global]
log_level = info
default_action = drop

# Management Interface
[rule:100]
name = allow-ssh
action = accept
protocol = tcp
src_any = true
dst_port = 22
log = true
comment = Allow SSH access

[rule:110]
name = allow-cli
action = accept
protocol = tcp
src_any = true
dst_port = 2022
log = true
comment = Allow NGFW CLI

[rule:120]
name = allow-web
action = accept
protocol = tcp
src_any = true
dst_port = 8443
log = true
comment = Allow Web UI

# HTTP/HTTPS
[rule:200]
name = allow-http
action = accept
protocol = tcp
src_any = true
dst_port = 80
log = false
comment = Allow HTTP

[rule:210]
name = allow-https
action = accept
protocol = tcp
src_any = true
dst_port = 443
log = false
comment = Allow HTTPS

# ICMP
[rule:300]
name = allow-icmp
action = accept
protocol = icmp
src_any = true
log = false
comment = Allow ICMP

# DNS
[rule:400]
name = allow-dns
action = accept
protocol = udp
src_any = true
dst_port = 53
log = false
comment = Allow DNS

# NTP
[rule:410]
name = allow-ntp
action = accept
protocol = udp
src_any = true
dst_port = 123
log = false
comment = Allow NTP

# VPN
[rule:500]
name = allow-ike
action = accept
protocol = udp
src_any = true
dst_port = 500
log = true
comment = Allow IKE

[rule:510]
name = allow-ipsec
action = accept
protocol = esp
src_any = true
log = true
comment = Allow ESP

[rule:520]
name = allow-openvpn
action = accept
protocol = tcp
src_any = true
dst_port = 1194
log = true
comment = Allow OpenVPN

# SNMP
[rule:600]
name = allow-snmp
action = accept
protocol = udp
src_any = true
dst_port = 161
log = true
comment = Allow SNMP

# Block common attacks
[rule:1000]
name = block-null-scan
action = drop
protocol = tcp
tcp_flags = NONE
log = true
comment = Block NULL scan

[rule:1010]
name = block-xmas-scan
action = drop
protocol = tcp
tcp_flags = FIN,URG,PSH
log = true
comment = Block Xmas scan

[rule:1020]
name = block-syn-flood
action = drop
protocol = tcp
tcp_flags = SYN
rate_limit = 100/sec
log = true
comment = Block SYN flood

# Internal network
[rule:2000]
name = allow-internal
action = accept
src_net = 192.168.1.0/24
log = false
comment = Allow internal network

# Log dropped packets
[rule:9000]
name = log-dropped
action = log
log = true
log_prefix = "NGFW-DROP: "
comment = Log all dropped packets