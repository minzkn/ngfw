# NGFW System Configuration
#

[general]
# System identity
hostname = ngfw
domain = localdomain
timezone = UTC

[daemon]
# Daemon settings
daemon = true
pid_file = /var/run/ngfw.pid
user = ngfw
group = ngfw
nice = -10

[logging]
# Logging configuration
level = info
file = /var/log/ngfw/ngfw.log
max_size = 10485760
max_files = 10
syslog = true
remote_log = false

[network]
# Network settings
interface = eth0
mtu = 1500
ip_address = 192.168.1.100
netmask = 255.255.255.0
gateway = 192.168.1.1
dns_primary = 8.8.8.8
dns_secondary = 8.8.4.4

# Enable packet forwarding
ip_forward = true
ipv6_forward = false

# Connection tracking
conntrack_max = 262144
conntrack_timeout = 3600
conntrack_tcp_established = 3600
conntrack_udp_timeout = 60

[performance]
# Performance settings
worker_threads = 4
packet_queue_size = 4096
session_table_size = 65536
flow_table_size = 131072
hash_table_size = 65536

# Memory settings
max_memory = 1073741824
buffer_size = 16777216

[security]
# Security settings

# IPS (Intrusion Prevention System)
ips_enabled = true
ips_mode = inline
ips_rules_update = daily

# VPN
vpn_enabled = false
vpn_type = ipsec
vpn_port = 500
vpn_subnet = 10.8.0.0/24

# URL Filtering
urlfilter_enabled = true
urlfilter_categories = malware,phishing,adult,gambling

# Anti-Virus
antivirus_enabled = false
av_scan_attachments = true
av_max_size = 10485760

# DDoS Protection
ddos_enabled = true
ddos_syn_limit = 1000
ddos_conn_limit = 5000

[firewall]
# Firewall defaults
default_policy = drop
default_inbound = drop
default_outbound = accept
default_forward = drop

# NAT
nat_enabled = true
nat_mode = masquerade

# QoS
qos_enabled = true
qos_default_class = normal
qos_bandwidth = 100000

[filter]
# Filter rules
rules_file = /etc/ngfw/rules/firewall.conf
ipv6_filter = false
fragment_handling = drop

[web]
# Web interface
enabled = true
port = 8443
ssl = true
cert = /etc/ngfw/ssl/server.crt
key = /etc/ngfw/ssl/server.key

# API
api_enabled = true
api_key = changeme
api_rate_limit = 100

# Authentication
auth_enabled = true
session_timeout = 3600
max_login_attempts = 5
lockout_duration = 300

[cli]
# CLI settings
enabled = true
port = 2022
banner = "NGFW Firewall v2.0.0"
history_size = 100

[snmp]
# SNMP settings
enabled = false
port = 161
community = public
version = 2c
location = "NGFW Firewall"
contact = admin@ngfw.local

[prometheus]
# Prometheus metrics
enabled = true
port = 9090
path = /metrics
interval = 60

[monitoring]
# Monitoring
cpu_threshold = 90
memory_threshold = 90
disk_threshold = 90
packet_rate_threshold = 100000
alert_email = admin@ngfw.local
alert_webhook = 

[firmware]
# Firmware update
auto_check = false
check_interval = 86400
update_server = https://updates.ngfw.local
keep_backup = true
max_backups = 3

[backup]
# Backup settings
enabled = true
interval = daily
path = /var/backup
retention = 7
compression = gzip

[ha]
# High availability
enabled = false
mode = active-passive
peer_ip = 
sync_interface = eth1
sync_port = 3306
vrrp_id = 1
vrrp_priority = 100