# NGFW Configuration File
# Next-Generation Firewall

[general]
# Daemon configuration
daemon = false
pid_file = /var/run/ngfw.pid
user = root
group = root

# Logging
log_level = info
log_file = /var/log/ngfw.log
log_max_size = 10485760
log_max_files = 5

[network]
# Network interface to bind
interface = eth0

# MTU size
mtu = 1500

# Enable packet forwarding
forwarding = true

[performance]
# Worker threads
worker_threads = 4

# Packet queue size
packet_queue_size = 4096

# Session table size
session_table_size = 65536

# Connection tracking timeout
conntrack_timeout = 300

[security]
# IPS (Intrusion Prevention System)
ips_enabled = true
ips_mode = inline

# VPN configuration
vpn_enabled = false

# URL Filter
urlfilter_enabled = true

# Anti-Virus
antivirus_enabled = false

[filter]
# Default policy
default_action = allow

# Filter rules file
rules_file = /etc/ngfw/rules.conf

[qos]
# QoS enabled
qos_enabled = true

# Default bandwidth (Mbps)
default_bandwidth = 100

# Traffic classes
# priority_high = 10
# priority_normal = 70
# priority_low = 20

[web]
# Web interface
web_enabled = true
web_port = 8443
web_ssl = true
web_cert = /etc/ngfw/ssl/server.crt
web_key = /etc/ngfw/ssl/server.key

# API authentication
api_enabled = true
api_key = changeme

[monitoring]
# SNMP
snmp_enabled = false
snmp_port = 161
snmp_community = public

# Statistics interval (seconds)
stats_interval = 60

[cli]
# CLI enabled
cli_enabled = true
cli_port = 2022
